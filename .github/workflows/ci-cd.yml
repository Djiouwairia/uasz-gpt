name: UASZ-GPT CI/CD Pipeline

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]

env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:

  # ============================================
  # JOB 1 : TESTS (toutes les branches)
  # ============================================
  tests:
    name: Tests automatiques
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root
          MYSQL_DATABASE: uaszgpt_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=3s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ----- Tests Backend Spring Boot -----
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'


      - name: Tests backend
        working-directory: ./backend
        run: |
          if [ -f "pom.xml" ]; then
            mvn test -B \
              -Dspring.datasource.url=jdbc:mysql://localhost:3306/uaszgpt_test \
              -Dspring.datasource.username=test_user \
              -Dspring.datasource.password=test_pass
          else
            echo "Pas encore de code backend — skip"
          fi

      # ----- Tests Frontend React -----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'


      - name: Tests frontend
        working-directory: ./frontend
        run: |
          if [ -f "package.json" ]; then
            npm ci
            npm test -- --watchAll=false --passWithNoTests
          else
            echo "Pas encore de code frontend — skip"
          fi

      # ----- Tests IA Engine -----
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Tests IA engine
        working-directory: ./ia-engine
        run: |
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
            python -m pytest tests/ -v --tb=short || echo "Pas encore de tests IA"
          else
            echo "Pas encore de code IA — skip"
          fi

  # ============================================
  # JOB 2 : BUILD DOCKER + PUSH ECR
  # (uniquement sur main et staging)
  # ============================================
  build-and-push:
    name: Build et push images Docker
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'

    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Tag de l'image
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login vers ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build et push backend
        run: |
          if [ -f "backend/pom.xml" ]; then
            docker build -t $ECR_REGISTRY/uaszgpt/backend:${{ steps.tag.outputs.tag }} ./backend
            docker tag $ECR_REGISTRY/uaszgpt/backend:${{ steps.tag.outputs.tag }} $ECR_REGISTRY/uaszgpt/backend:latest
            docker push $ECR_REGISTRY/uaszgpt/backend:${{ steps.tag.outputs.tag }}
            docker push $ECR_REGISTRY/uaszgpt/backend:latest
          else
            echo "Backend pas encore prêt — skip"
          fi

      - name: Build et push frontend
        run: |
          if [ -f "frontend/package.json" ]; then
            docker build -t $ECR_REGISTRY/uaszgpt/frontend:${{ steps.tag.outputs.tag }} ./frontend
            docker tag $ECR_REGISTRY/uaszgpt/frontend:${{ steps.tag.outputs.tag }} $ECR_REGISTRY/uaszgpt/frontend:latest
            docker push $ECR_REGISTRY/uaszgpt/frontend:${{ steps.tag.outputs.tag }}
            docker push $ECR_REGISTRY/uaszgpt/frontend:latest
          else
            echo "Frontend pas encore prêt — skip"
          fi

      - name: Build et push IA engine
        run: |
          docker build -t $ECR_REGISTRY/uaszgpt/ia-engine:${{ steps.tag.outputs.tag }} ./ia-engine
          docker tag $ECR_REGISTRY/uaszgpt/ia-engine:${{ steps.tag.outputs.tag }} $ECR_REGISTRY/uaszgpt/ia-engine:latest
          docker push $ECR_REGISTRY/uaszgpt/ia-engine:${{ steps.tag.outputs.tag }}
          docker push $ECR_REGISTRY/uaszgpt/ia-engine:latest

  # ============================================
  # JOB 3 : DEPLOY STAGING
  # (uniquement sur la branche staging)
  # ============================================
  deploy-staging:
    name: Déploiement staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/staging'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy sur EC2 staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST_STAGING }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /app/uaszgpt

            # Mise à jour des variables d'environnement
            echo "DB_USER=${{ secrets.DB_USER }}" > .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}" >> .env
            echo "GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}" >> .env
            echo "ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}" >> .env

            # Login ECR sur le serveur
            aws ecr get-login-password --region eu-west-1 \
              | docker login --username AWS \
                --password-stdin ${{ secrets.ECR_REGISTRY }}

            # Pull et redémarrage
            docker compose pull
            docker compose up -d --remove-orphans

            # Vérification santé
            sleep 20
            docker compose ps
            echo "Déploiement staging terminé !"

  # ============================================
  # JOB 4 : DEPLOY PRODUCTION
  # (uniquement sur main)
  # ============================================
  deploy-production:
    name: Déploiement production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy sur EC2 production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /app/uaszgpt

            # Variables d'environnement production
            echo "DB_USER=${{ secrets.DB_USER }}" > .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}" >> .env
            echo "GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}" >> .env
            echo "ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}" >> .env

            # Login ECR
            aws ecr get-login-password --region eu-west-1 \
              | docker login --username AWS \
                --password-stdin ${{ secrets.ECR_REGISTRY }}

            # Déploiement zero-downtime
            docker compose pull
            docker compose up -d --no-deps --remove-orphans

            # Health check
            sleep 20
            curl -f http://localhost:8080/actuator/health \
              && echo "Production OK !" \
              || (echo "ERREUR - Rollback !" && docker compose down && exit 1)